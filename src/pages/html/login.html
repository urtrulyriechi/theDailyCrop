<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Account | theDailyCrop.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="../../assets/images/icons/dc-logo.png" />

    <link rel="stylesheet" href="../css/login.css" />
  </head>


    <!-- Login / Account Section -->
    <section class="login-section">
      <!-- LOGIN FORM -->
      <div class="login-container" id="login-box">
        <h1>Welcome Back</h1>
        <p>Log in to continue your harvest journey.</p>

        <form id="login-form">
          <div class="input-group">
            <label>Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
            />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="remember-row">
            <label class="remember">
              <input type="checkbox" />
              Remember me
            </label>

            <a href="#">Forgot Password?</a>
          </div>

          <button type="submit" class="btn">Log In</button>
        </form>
      </div>

      <!-- ACCOUNT PAGE -->
      <div class="login-container" id="account-box" style="display: none">
        <h1>Hello, <span id="display-user"></span> !</h1>

        <p>Welcome back to theDailyCrop.</p>

        <div class="account-actions">
          <button id="back-btn" class="btn back-btn">← Back</button>
          <button id="logout-btn" class="btn">Logout</button>
        </div>
      </div>
    </section>

    <script src="../js/login.js"></script>
  </body>
</html>
